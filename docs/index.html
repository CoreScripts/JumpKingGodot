<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml' lang='' xml:lang=''>
<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, user-scalable=no' />
    <title>JumpKingClone</title>
    <style type='text/css'>

        body {
            touch-action: none;
            margin: 0;
            border: 0 none;
            padding: 0;
            text-align: center;
            background-color: black;
        }

        #canvas {
            display: block;
            margin: 0;
            color: white;
        }

        #canvas:focus {
            outline: none;
        }

        .godot {
            font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
            color: #e0e0e0;
            background-color: #3b3943;
            background-image: linear-gradient(to bottom, #403e48, #35333c);
            border: 1px solid #45434e;
            box-shadow: 0 0 1px 1px #2f2d35;
        }


        /* Status display
         * ============== */

        #status {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* don't consume click events - make children visible explicitly */
            visibility: hidden;
        }

        #status-progress {
            width: 366px;
            height: 7px;
            background-color: #38363A;
            border: 1px solid #444246;
            padding: 1px;
            box-shadow: 0 0 2px 1px #1B1C22;
            border-radius: 2px;
            visibility: visible;
        }

        @media only screen and (orientation:portrait) {
            #status-progress {
                width: 61.8%;
            }
        }

        #status-progress-inner {
            height: 100%;
            width: 0;
            box-sizing: border-box;
            transition: width 0.5s linear;
            background-color: #202020;
            border: 1px solid #222223;
            box-shadow: 0 0 1px 1px #27282E;
            border-radius: 3px;
        }

        #status-indeterminate {
            visibility: visible;
            position: relative;
        }

        #status-indeterminate > div {
            width: 4.5px;
            height: 0;
            border-style: solid;
            border-width: 9px 3px 0 3px;
            border-color: #2b2b2b transparent transparent transparent;
            transform-origin: center 21px;
            position: absolute;
        }

        #status-indeterminate > div:nth-child(1) { transform: rotate( 22.5deg); }
        #status-indeterminate > div:nth-child(2) { transform: rotate( 67.5deg); }
        #status-indeterminate > div:nth-child(3) { transform: rotate(112.5deg); }
        #status-indeterminate > div:nth-child(4) { transform: rotate(157.5deg); }
        #status-indeterminate > div:nth-child(5) { transform: rotate(202.5deg); }
        #status-indeterminate > div:nth-child(6) { transform: rotate(247.5deg); }
        #status-indeterminate > div:nth-child(7) { transform: rotate(292.5deg); }
        #status-indeterminate > div:nth-child(8) { transform: rotate(337.5deg); }

        #status-notice {
            margin: 0 100px;
            line-height: 1.3;
            visibility: visible;
            padding: 4px 6px;
            visibility: visible;
        }
    </style>
<link id='-gd-engine-icon' rel='icon' type='image/png' href='index.icon.png' />

<body>
    <canvas id='canvas'>
        HTML5 canvas appears to be unsupported in the current browser.<br />
        Please try updating or use a different browser.
    </canvas>
    <div id='status'>
        <div id='status-progress' style='display: none;' oncontextmenu='event.preventDefault();'><div id ='status-progress-inner'></div></div>
        <div id='status-indeterminate' style='display: none;' oncontextmenu='event.preventDefault();'>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div id='status-notice' class='godot' style='display: none;'></div>
    </div>

    <script type='text/javascript' src='index.js'></script>
    <script type='text/javascript'>//<![CDATA[

        const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":8087408,"index.wasm":13111445},"focusCanvas":true,"gdnativeLibs":[]};
        var engine = new Engine(GODOT_CONFIG);

        (function() {
            const INDETERMINATE_STATUS_STEP_MS = 100;
            var statusProgress = document.getElementById('status-progress');
            var statusProgressInner = document.getElementById('status-progress-inner');
            var statusIndeterminate = document.getElementById('status-indeterminate');
            var statusNotice = document.getElementById('status-notice');

            var initializing = true;
            var statusMode = 'hidden';

            var animationCallbacks = [];
            function animate(time) {
                animationCallbacks.forEach(callback => callback(time));
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);

            function setStatusMode(mode) {

                if (statusMode === mode || !initializing)
                    return;
                [statusProgress, statusIndeterminate, statusNotice].forEach(elem => {
                    elem.style.display = 'none';
                });
                animationCallbacks = animationCallbacks.filter(function(value) {
                    return (value != animateStatusIndeterminate);
                });
                switch (mode) {
                    case 'progress':
                        statusProgress.style.display = 'block';
                        break;
                    case 'indeterminate':
                        statusIndeterminate.style.display = 'block';
                        animationCallbacks.push(animateStatusIndeterminate);
                        break;
                    case 'notice':
                        statusNotice.style.display = 'block';
                        break;
                    case 'hidden':
                        break;
                    default:
                        throw new Error('Invalid status mode');
                }
                statusMode = mode;
            }

            function animateStatusIndeterminate(ms) {
                var i = Math.floor(ms / INDETERMINATE_STATUS_STEP_MS % 8);
                if (statusIndeterminate.children[i].style.borderTopColor == '') {
                    Array.prototype.slice.call(statusIndeterminate.children).forEach(child => {
                        child.style.borderTopColor = '';
                    });
                    statusIndeterminate.children[i].style.borderTopColor = '#dfdfdf';
                }
            }

            function setStatusNotice(text) {
                while (statusNotice.lastChild) {
                    statusNotice.removeChild(statusNotice.lastChild);
                }
                var lines = text.split('\n');
                lines.forEach((line) => {
                    statusNotice.appendChild(document.createTextNode(line));
                    statusNotice.appendChild(document.createElement('br'));
                });
            };

            function displayFailureNotice(err) {
                var msg = err.message || err;
                console.error(msg);
                setStatusNotice(msg);
                setStatusMode('notice');
                initializing = false;
            };

            if (!Engine.isWebGLAvailable()) {
                displayFailureNotice('WebGL not available');
            } else {
                setStatusMode('indeterminate');
                engine.startGame({
                    'onProgress': function (current, total) {
                        if (total > 0) {
                            statusProgressInner.style.width = current/total * 100 + '%';
                            setStatusMode('progress');
                            if (current === total) {
                                // wait for progress bar animation
                                setTimeout(() => {
                                    setStatusMode('indeterminate');
                                }, 500);
                            }
                        } else {
                            setStatusMode('indeterminate');
                        }
                    },
                }).then(() => {
                    setStatusMode('hidden');
                    initializing = false;
                }, displayFailureNotice);
            }
        })();
    //]]></script>

<!-- MOBILE CONTROLS — paste just before </body> -->
<style>
  #mobile-controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    pointer-events: none;
    z-index: 1000;
    user-select: none;
    -webkit-user-select: none;
  }

  #mobile-controls.hidden {
    display: none;
  }

  /* ── Toggle button ───────────────────────────── */
  #controls-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 1001;
    width: 36px;
    height: 36px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #controls-toggle:hover { background: rgba(0,0,0,0.8); }

  #controls-toggle .bar {
    position: absolute;
    width: 16px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: transform 0.2s, opacity 0.2s;
  }
  #controls-toggle .bar:nth-child(1) { transform: translateY(-5px); }
  #controls-toggle .bar:nth-child(3) { transform: translateY(5px); }
  #controls-toggle.active .bar:nth-child(1) { transform: translateY(0) rotate(45deg); }
  #controls-toggle.active .bar:nth-child(2) { opacity: 0; }
  #controls-toggle.active .bar:nth-child(3) { transform: translateY(0) rotate(-45deg); }

  /* ── D-pad left cluster ──────────────────────── */
  #dpad {
    position: absolute;
    bottom: 24px;
    left: 28px;
    display: flex;
    gap: 8px;
    pointer-events: all;
  }

  /* ── Jump button right ───────────────────────── */
  #btn-jump-wrap {
    position: absolute;
    bottom: 24px;
    right: 28px;
    pointer-events: all;
  }

  /* ── Shared button style ─────────────────────── */
  .ctrl-btn {
    width: 64px;
    height: 64px;
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.08s, border-color 0.08s, transform 0.08s;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn.pressed {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.7);
    transform: scale(0.93);
  }

  .arrow {
    width: 0;
    height: 0;
    display: block;
  }
  .arrow-left {
    border-top: 11px solid transparent;
    border-bottom: 11px solid transparent;
    border-right: 18px solid rgba(255,255,255,0.85);
  }
  .arrow-right {
    border-top: 11px solid transparent;
    border-bottom: 11px solid transparent;
    border-left: 18px solid rgba(255,255,255,0.85);
  }
  .arrow-up {
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-bottom: 18px solid rgba(255,255,255,0.85);
  }

  #btn-jump {
    width: 72px;
    height: 72px;
    border-radius: 50%;
  }
</style>

<button id="controls-toggle" title="Toggle mobile controls" aria-label="Toggle mobile controls">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</button>

<div id="mobile-controls">
  <div id="dpad">
    <div class="ctrl-btn" id="btn-left"  data-key="ArrowLeft"  data-code="ArrowLeft">
      <span class="arrow arrow-left"></span>
    </div>
    <div class="ctrl-btn" id="btn-right" data-key="ArrowRight" data-code="ArrowRight">
      <span class="arrow arrow-right"></span>
    </div>
  </div>
  <div id="btn-jump-wrap">
    <div class="ctrl-btn" id="btn-jump" data-key=" " data-code="Space">
      <span class="arrow arrow-up"></span>
    </div>
  </div>
</div>

<script>
(function () {
  // Detect touch device for auto-show, but always allow keyboard
  var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  var controls  = document.getElementById('mobile-controls');
  var toggleBtn = document.getElementById('controls-toggle');
  var visible   = isTouchDevice;

  function applyVisibility() {
    controls.classList.toggle('hidden', !visible);
    toggleBtn.classList.toggle('active', visible);
  }
  applyVisibility();

  toggleBtn.addEventListener('click', function () {
    visible = !visible;
    applyVisibility();
  });

  // ── Get the Godot canvas ──────────────────────────────────
  function getCanvas() {
    return document.getElementById('canvas');
  }

  // ── Track simulated keys from touch controls ──────────────
  var simulatedHeld = {};

  function pressKey(key, code) {
    var lookupKey = key === ' ' ? 'Space' : key;
    if (simulatedHeld[lookupKey]) return;
    simulatedHeld[lookupKey] = true;
    
    // Dispatch to both canvas and window for better compatibility
    var c = getCanvas();
    var keyCode = code === 'ArrowLeft' ? 37 : (code === 'ArrowRight' ? 39 : 32);
    
    var eventProps = {
      key: key,
      code: code,
      keyCode: keyCode,
      which: keyCode,
      bubbles: true,
      cancelable: true,
      composed: true
    };
    
    var event = new KeyboardEvent('keydown', eventProps);
    
    // Dispatch to window (Godot often listens here)
    window.dispatchEvent(event);
    
    // Also dispatch to canvas
    if (c) {
      c.dispatchEvent(event);
    }
  }

  function releaseKey(key, code) {
    var lookupKey = key === ' ' ? 'Space' : key;
    if (!simulatedHeld[lookupKey]) return;
    simulatedHeld[lookupKey] = false;
    
    var c = getCanvas();
    var keyCode = code === 'ArrowLeft' ? 37 : (code === 'ArrowRight' ? 39 : 32);
    
    var eventProps = {
      key: key,
      code: code,
      keyCode: keyCode,
      which: keyCode,
      bubbles: true,
      cancelable: true,
      composed: true
    };
    
    var event = new KeyboardEvent('keyup', eventProps);
    window.dispatchEvent(event);
    if (c) {
      c.dispatchEvent(event);
    }
  }

  // ── Attach touch/mouse listeners to buttons ───────────────
  var buttons = document.querySelectorAll('.ctrl-btn');
  buttons.forEach(function (btn) {
    var key  = btn.getAttribute('data-key');
    var code = btn.getAttribute('data-code');

    function down(e) {
      e.preventDefault();
      btn.classList.add('pressed');
      pressKey(key, code);
    }
    function up(e) {
      e.preventDefault();
      btn.classList.remove('pressed');
      releaseKey(key, code);
    }

    btn.addEventListener('touchstart',  down, { passive: false });
    btn.addEventListener('touchend',    up,   { passive: false });
    btn.addEventListener('touchcancel', up,   { passive: false });
    btn.addEventListener('mousedown',   down);
    btn.addEventListener('mouseup',     up);
    btn.addEventListener('mouseleave',  up);
  });

  // Release all simulated keys if window loses focus
  window.addEventListener('blur', function () {
    Object.keys(simulatedHeld).forEach(function(key) {
      var code = key === 'Space' ? 'Space' : (key === 'ArrowLeft' ? 'ArrowLeft' : 'ArrowRight');
      var displayKey = code === 'Space' ? ' ' : code;
      releaseKey(displayKey, code);
    });
  });

  // Focus canvas when controls are tapped
  function focusCanvas() {
    var c = getCanvas();
    if (c && document.activeElement !== c) {
      c.focus();
    }
  }
  if (document.getElementById('mobile-controls')) {
    document.getElementById('mobile-controls').addEventListener('touchstart', focusCanvas, { passive: true });
  }

  // ── KEYBOARD SUPPORT with A/D mapping ─────────────────────
  var canvas = getCanvas();
  if (canvas) {
    canvas.setAttribute('tabindex', '0');
    canvas.style.outline = 'none';
  }
  
  // Track physical key state to avoid double events
  var physicalActive = {};
  
  // Helper to send key event to Godot
  function sendKeyEvent(type, originalKey, mappedKey, mappedCode) {
    var target = getCanvas();
    if (!target) target = window;
    
    var keyCode = mappedCode === 'ArrowLeft' ? 37 : (mappedCode === 'ArrowRight' ? 39 : 32);
    
    var event = new KeyboardEvent(type, {
      key: mappedKey,
      code: mappedCode,
      keyCode: keyCode,
      which: keyCode,
      bubbles: true,
      cancelable: true,
      composed: true
    });
    
    target.dispatchEvent(event);
    window.dispatchEvent(event); // Also dispatch to window to be safe
  }
  
  // Listen for keydown on window
  window.addEventListener('keydown', function(e) {
    var key = e.key;
    var target = e.target;
    
    // Don't interfere with input fields
    if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
      return;
    }
    
    var mappedKey = null;
    var mappedCode = null;
    var shouldPrevent = false;
    
    // Map A and D to arrow keys
    if (key === 'a' || key === 'A') {
      mappedKey = 'ArrowLeft';
      mappedCode = 'ArrowLeft';
      shouldPrevent = true;
    } else if (key === 'd' || key === 'D') {
      mappedKey = 'ArrowRight';
      mappedCode = 'ArrowRight';
      shouldPrevent = true;
    } else if (key === 'ArrowLeft') {
      mappedKey = 'ArrowLeft';
      mappedCode = 'ArrowLeft';
      shouldPrevent = true;
    } else if (key === 'ArrowRight') {
      mappedKey = 'ArrowRight';
      mappedCode = 'ArrowRight';
      shouldPrevent = true;
    } else if (key === ' ' || key === 'Space' || key === 'Spacebar') {
      mappedKey = ' ';
      mappedCode = 'Space';
      shouldPrevent = true;
    }
    
    if (mappedKey) {
      // Prevent duplicate events
      var id = mappedCode;
      if (!physicalActive[id]) {
        physicalActive[id] = true;
        sendKeyEvent('keydown', key, mappedKey, mappedCode);
      }
      
      if (shouldPrevent) {
        e.preventDefault();
        e.stopPropagation();
      }
    }
  });
  
  window.addEventListener('keyup', function(e) {
    var key = e.key;
    var target = e.target;
    
    if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
      return;
    }
    
    var mappedKey = null;
    var mappedCode = null;
    var shouldPrevent = false;
    
    if (key === 'a' || key === 'A') {
      mappedKey = 'ArrowLeft';
      mappedCode = 'ArrowLeft';
      shouldPrevent = true;
    } else if (key === 'd' || key === 'D') {
      mappedKey = 'ArrowRight';
      mappedCode = 'ArrowRight';
      shouldPrevent = true;
    } else if (key === 'ArrowLeft') {
      mappedKey = 'ArrowLeft';
      mappedCode = 'ArrowLeft';
      shouldPrevent = true;
    } else if (key === 'ArrowRight') {
      mappedKey = 'ArrowRight';
      mappedCode = 'ArrowRight';
      shouldPrevent = true;
    } else if (key === ' ' || key === 'Space' || key === 'Spacebar') {
      mappedKey = ' ';
      mappedCode = 'Space';
      shouldPrevent = true;
    }
    
    if (mappedKey) {
      var id = mappedCode;
      if (physicalActive[id]) {
        physicalActive[id] = false;
        sendKeyEvent('keyup', key, mappedKey, mappedCode);
      }
      
      if (shouldPrevent) {
        e.preventDefault();
        e.stopPropagation();
      }
    }
  });
  
  // Also listen for original key events on canvas directly
  if (canvas) {
    canvas.addEventListener('keydown', function(e) {
      // Let our window handler manage it, but ensure no double handling
      if (e.key === 'a' || e.key === 'A' || e.key === 'd' || e.key === 'D' ||
          e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Space') {
        e.preventDefault();
      }
    });
    
    canvas.addEventListener('click', function() { canvas.focus(); });
    
    // Initial focus
    setTimeout(function() { canvas.focus(); }, 100);
  }
  
  // Click anywhere on body to focus canvas (for keyboard to work)
  document.body.addEventListener('click', function(e) {
    if (canvas && e.target !== canvas && !canvas.contains(e.target)) {
      // Don't steal focus if clicking on controls button
      if (e.target.id !== 'controls-toggle' && !e.target.closest('.ctrl-btn')) {
        canvas.focus();
      }
    } else if (canvas && (e.target === canvas || canvas.contains(e.target))) {
      canvas.focus();
    }
  });
  
  console.log('Keyboard enabled: Arrow keys, A/D for movement, Space for jump');
})();
</script>
